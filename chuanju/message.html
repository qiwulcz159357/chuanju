<section class="pt-5 mt-5">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">互动留言区</h2>
      <p class="text-muted">留下你对川剧变脸非遗文化的祝福与见解</p>
    </div>
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <form id="messageForm" class="bg-light p-4 rounded shadow-sm mb-5">
          <div class="mb-3">
            <label class="form-label">你的姓名<span class="text-danger">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="请输入姓名" required>
          </div>
          <div class="mb-3">
            <label class="form-label">联系电话</label>
            <input type="tel" id="phone" class="form-control" placeholder="请输入手机号码">
            <div id="phoneTip" class="invalid-feedback"></div>
          </div>
          <div class="mb-3">
            <label class="form-label">电子邮箱</label>
            <input type="email" id="email" class="form-control" placeholder="请输入电子邮箱">
            <div id="emailTip" class="invalid-feedback"></div>
          </div>
          <div class="mb-3">
            <label class="form-label">留言内容 <span class="text-danger">*</span></label>
            <textarea id="content" class="form-control" rows="4" placeholder="请输入留言内容" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">提交留言</button>
        </form>


        <div id="msgContainer" class="bg-white rounded shadow-sm p-3"></div>
      </div>
    </div>
  </div>
</section>
